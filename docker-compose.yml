services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Persist SQLite database across container rebuilds
      - ./backend/colony.db:/colony/backend/colony.db
      # Persist L&D reports and state file
      - ./docs:/colony/docs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      # VITE_API_URL is consumed by the browser, so it must be the host-visible address.
      # Change this if running on a remote server (e.g. http://your-server-ip:8000).
      VITE_API_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
